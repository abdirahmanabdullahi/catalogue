name: catalogue
description: "Grundfos Product Center — Flutter copy of product-selection.grundfos.com"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  shared_preferences: ^2.5.5
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/home/
    - assets/images/brand/
    - assets/images/categories/
    - assets/images/applications/
    - assets/images/products/

  fonts:
    - family: Grundfos
      fonts:
        - asset: assets/fonts/GrundfosTheSans-SemiLight.ttf
          weight: 300
        - asset: assets/fonts/GrundfosTheSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/GrundfosTheSans-Bold.ttf
          weight: 700
    - family: Grundfos-Extd
      fonts:
        - asset: assets/fonts/GrundfosTheSans-ExtdBold.ttf
          weight: 700
